services:
  - type: web
    name: za-health-check-main
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: za-db
          property: connectionString
      - key: V11_AUTH_TOKEN
        generateValue: true

databases:
  - name: za-db
    plan: free
